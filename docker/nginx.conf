# Nabla AI frontend — SPA + same-origin /api reverse proxy.
# Included at the http{} level by the stock nginx.conf, so the map is legal here.

# WebSocket upgrade passthrough (telemetry stream).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # STL uploads can be large.
    client_max_body_size 512m;

    # Big localhost cookie jars (every dev app shares them) must not kill the
    # telemetry WebSocket handshake — default is 8k per header line.
    large_client_header_buffers 8 32k;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA routes (/pre, /sim, /post) all resolve to index.html.
    location / {
        try_files $uri /index.html;
    }

    # Orchestration API + telemetry WebSocket → backend service.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # telemetry sockets stay open for the whole run
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
